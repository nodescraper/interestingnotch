name: "Deploy Interesting Notch"
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without leading v)"
        required: true
      title:
        description: "Release title suffix"
        required: false
        default: "Manual release"
      release_notes:
        description: "Release notes markdown"
        required: false
        default: "- Manual release"
      is_beta:
        description: "Publish as beta/prerelease"
        required: false
        type: boolean
        default: false

concurrency:
  group: release-${{ github.run_id }}
  cancel-in-progress: true

env:
  PROJECT_NAME: InterestingNotch
  RELEASE_REPOSITORY: nodescraper/interestingnotch
  BETA_CHANNEL_NAME: beta
  RELEASE_COMMAND: /release
  CODE_SIGN_IDENTITY: "Apple Development"
  XCODE_VERSION: "16.4"

permissions:
  contents: read

jobs:
  preparation:
    name: Preparation
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      is_beta: ${{ steps.release_inputs.outputs.is_beta }}
      version: ${{ steps.release_inputs.outputs.version }}
      build_number: ${{ steps.release_inputs.outputs.build_number }}
      xcode_version: ${{ steps.build_config.outputs.xcode_version }}
      code_sign_identity: ${{ steps.build_config.outputs.code_sign_identity }}
      title: ${{ steps.release_notes.outputs.title }}
      release_notes: ${{ steps.release_notes.outputs.release_notes }}
      release_notes_github: ${{ steps.release_notes.outputs.release_notes_github }}
      head_ref: main
      base_ref: main
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main

      - name: Resolve release inputs
        id: release_inputs
        env:
          VERSION: ${{ github.event.inputs.version }}
          IS_BETA: ${{ github.event.inputs.is_beta }}
        run: |
          set -euo pipefail
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9]+)?$ ]] || {
            echo "::error::Version must look like 1.1.0 or 1.1.0-beta1"
            exit 1
          }
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          {
            echo "version=$VERSION"
            echo "is_beta=$IS_BETA"
            echo "build_number=$BUILD_NUMBER"
          } >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION | Beta: $IS_BETA | Build: $BUILD_NUMBER"

      - name: Expose build configuration
        id: build_config
        run: |
          {
            echo "xcode_version=${{ env.XCODE_VERSION }}"
            echo "code_sign_identity=${{ env.CODE_SIGN_IDENTITY }}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: release_notes
        env:
          INPUT_TITLE: ${{ github.event.inputs.title }}
          INPUT_NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          set -euo pipefail
          TITLE="${INPUT_TITLE:-Manual release}"
          BODY="${INPUT_NOTES:-- Manual release}"

          BODY_GITHUB=$(printf '%s' "$BODY" | sed '/^# /d' | perl -pe 's#<h1[^>]*>.*?</h1>##gi')

          {
            echo "title=${TITLE}"
            echo "release_notes<<RELEASE_NOTES_DELIM"
            echo "$BODY"
            echo "RELEASE_NOTES_DELIM"
            echo "release_notes_github<<RELEASE_NOTES_GH_DELIM"
            echo "$BODY_GITHUB"
            echo "RELEASE_NOTES_GH_DELIM"
          } >> "$GITHUB_OUTPUT"

      - name: Check version not already released
        env:
          VERSION: ${{ steps.release_inputs.outputs.version }}
        run: |
          git fetch --tags
          if git rev-parse -q --verify "refs/tags/v${VERSION}" >/dev/null; then
            echo "::error::Version v${VERSION} already exists as a tag"
            exit 1
          fi

  build:
    name: Build and sign
    needs: preparation
    permissions:
      contents: write
    uses: ./.github/workflows/build_reusable.yml
    with:
      head_ref: ${{ needs.preparation.outputs.head_ref }}
      version: ${{ needs.preparation.outputs.version }}
      build_number: ${{ needs.preparation.outputs.build_number }}
      xcode_version: ${{ needs.preparation.outputs.xcode_version }}
      code_sign_identity: ${{ needs.preparation.outputs.code_sign_identity }}
    secrets:
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD:              ${{ secrets.P12_PASSWORD }}
      KEYCHAIN_PASSWORD:         ${{ secrets.KEYCHAIN_PASSWORD }}

  publish:
    name: Publish release
    needs: [preparation, build]
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      HEAD_REF: ${{ needs.preparation.outputs.head_ref }}
      VERSION: ${{ needs.preparation.outputs.version }}
      IS_BETA: ${{ needs.preparation.outputs.is_beta }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.HEAD_REF }}

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PROJECT_NAME }}.dmg
          path: Release

      - name: Create embedded release notes
        env:
          RELEASE_NOTES: ${{ needs.preparation.outputs.release_notes }}
        run: printf '%s' "$RELEASE_NOTES" > Release/InterestingNotch.html

      - name: Build Sparkle generate_appcast from source
        run: |
          set -euo pipefail
          SPARKLE_METADATA_PATH="InterestingNotch.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved"
          SPARKLE_SRC="$RUNNER_TEMP/Sparkle"
          SPARKLE_DERIVED="$RUNNER_TEMP/sparkle-derived"
          SPARKLE_REPO_URL="https://github.com/sparkle-project/Sparkle"

          IFS=$'\t' read -r SPARKLE_VERSION SPARKLE_REVISION <<< "$(python3 - "$SPARKLE_METADATA_PATH" <<'PY'
          import json
          import sys
          from pathlib import Path

          path = Path(sys.argv[1])
          data = json.loads(path.read_text())
          pins = data.get("pins", [])

          sparkle = next((pin for pin in pins if pin.get("identity") == "sparkle"), None)
          if sparkle is None:
              print(f"::error::No 'sparkle' pin found in {path}", file=sys.stderr)
              sys.exit(1)

          state = sparkle.get("state", {})
          version = state.get("version")
          revision = state.get("revision")

          if not version:
              print(f"::error::Sparkle pin in {path} is not version-pinned", file=sys.stderr)
              sys.exit(1)

          if not revision:
              print(f"::error::Sparkle pin in {path} has no revision", file=sys.stderr)
              sys.exit(1)

          print(f"{version}\t{revision}")
          PY
          )"

          echo "Using Sparkle ${SPARKLE_VERSION} (${SPARKLE_REVISION}) from ${SPARKLE_METADATA_PATH}"

          SPARKLE_TAG=""
          for candidate in "$SPARKLE_VERSION" "v$SPARKLE_VERSION"; do
            if git ls-remote --exit-code --tags "$SPARKLE_REPO_URL" "refs/tags/$candidate" >/dev/null; then
              SPARKLE_TAG="$candidate"
              break
            else
              ls_remote_exit=$?
              if [[ "$ls_remote_exit" -ne 2 ]]; then
                echo "::error::Failed to query Sparkle tags from $SPARKLE_REPO_URL while checking $candidate"
                exit 1
              fi
            fi
          done

          if [[ -z "$SPARKLE_TAG" ]]; then
            echo "::error::Could not find Sparkle tag $SPARKLE_VERSION or v$SPARKLE_VERSION"
            exit 1
          fi

          git clone \
            --depth 1 \
            --branch "$SPARKLE_TAG" \
            --single-branch \
            "$SPARKLE_REPO_URL" \
            "$SPARKLE_SRC"

          ACTUAL_REVISION="$(git -C "$SPARKLE_SRC" rev-parse HEAD)"
          if [[ "$ACTUAL_REVISION" != "$SPARKLE_REVISION" ]]; then
            echo "::error::Sparkle tag ${SPARKLE_TAG} resolves to ${ACTUAL_REVISION}, expected ${SPARKLE_REVISION}"
            exit 1
          fi

          xcodebuild -project "$SPARKLE_SRC/Sparkle.xcodeproj" \
            -scheme generate_appcast \
            -configuration Release \
            -derivedDataPath "$SPARKLE_DERIVED" \
            CODE_SIGNING_ALLOWED=NO \
            build

          APPCAST_BIN="$SPARKLE_DERIVED/Build/Products/Release/generate_appcast"
          [[ -x "$APPCAST_BIN" ]] || { echo "::error::generate_appcast was not built"; exit 1; }

          install -m 0755 "$APPCAST_BIN" "$RUNNER_TEMP/generate_appcast"

      - name: Generate signed appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.PRIVATE_SPARKLE_KEY }}
        run: |
          set -euo pipefail
          test -x "$RUNNER_TEMP/generate_appcast" || {
            echo "::error::$RUNNER_TEMP/generate_appcast missing or not executable"; exit 1;
          }
          CHANNEL_ARGS=()
          if [[ "${IS_BETA}" == "true" ]]; then
            CHANNEL_ARGS=(--channel "${{ env.BETA_CHANNEL_NAME }}")
          fi
          printf '%s' "$SPARKLE_PRIVATE_KEY" | "$RUNNER_TEMP/generate_appcast" \
            --ed-key-file - \
            --link "https://github.com/${{ env.RELEASE_REPOSITORY }}/releases" \
            --download-url-prefix "https://github.com/${{ env.RELEASE_REPOSITORY }}/releases/download/v${VERSION}/" \
            --embed-release-notes \
            "${CHANNEL_ARGS[@]}" \
            -o appcast.xml \
            Release/

          mkdir -p updater
          cp appcast.xml updater/appcast.xml

      - name: Commit appcast
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git add updater/appcast.xml
          if [[ "${IS_BETA}" == "true" ]]; then
            git commit -m "Update beta appcast for v${VERSION}" || true
          else
            git commit -m "Update appcast for v${VERSION}" || true
          fi
          git push origin main

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: ${{ needs.preparation.outputs.title }}
          NOTES: ${{ needs.preparation.outputs.release_notes_github }}
        run: |
          RELEASE_FLAGS=()
          if [[ "${IS_BETA}" == "true" ]]; then
            RELEASE_FLAGS=(--prerelease)
          fi
          gh release create "v${VERSION}" Release/InterestingNotch.dmg \
            --title "v${VERSION} - ${TITLE}" \
            --notes "$NOTES" \
            "${RELEASE_FLAGS[@]}"

  upgrade-brew:
    name: Update Homebrew cask
    needs: [preparation, publish]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.preparation.outputs.version }}
      IS_BETA: ${{ needs.preparation.outputs.is_beta }}
    steps:
      - name: Generate cask files
        run: |
          set -euo pipefail
          DMG_URL="https://github.com/${{ env.RELEASE_REPOSITORY }}/releases/download/v${VERSION}/InterestingNotch.dmg"

          # Retry SHA calculation (release may need a moment to propagate)
          for attempt in 1 2 3; do
            if SHA256=$(curl -sL --fail "$DMG_URL" | shasum -a 256 | cut -d' ' -f1); then break; fi
            echo "Attempt $attempt failed, retrying in 10s..."; sleep 10
          done
          [[ -n "${SHA256:-}" ]] || { echo "::error::Failed to download DMG for SHA256"; exit 1; }

          write_cask() {
            local CASK_NAME="$1" DISPLAY_NAME="$2" DESC="$3"
            cat <<CASK
          cask "${CASK_NAME}" do
            version "${VERSION}"
            sha256 "${SHA256}"
            url "${DMG_URL}"
            name "${DISPLAY_NAME}"
            desc "${DESC}"
            homepage "https://github.com/${{ env.RELEASE_REPOSITORY }}"
            livecheck do
              url :url
              strategy :github_latest
            end
            auto_updates true
            depends_on macos: :sonoma
            app "InterestingNotch.app"
            
            postflight do
              app_path = appdir/"InterestingNotch.app"
              next unless app_path.exist?
              system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", app_path]
            end

            uninstall quit: "com.nodescraper.interestingnotch"

            zap trash: [
              "~/Library/Application Scripts/com.nodescraper.interestingnotch/",
              "~/Library/Containers/com.nodescraper.interestingnotch/",
            ]
          end
          CASK
          }

          write_cask "interesting-notch@rc" "Interesting Notch RC" \
            "Not so interesting notch That Rocks (Release Candidate)" > interesting-notch@rc.rb
          if [[ "${IS_BETA}" == "false" ]]; then
            write_cask "interesting-notch" "Interesting Notch" \
              "Not so interesting notch That Rocks" > interesting-notch.rb
          fi

      - name: Upload cask artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: homebrew-cask-${{ env.VERSION }}
          path: interesting-notch*.rb

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: TheBoredTeam/homebrew-interesting-notch
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update casks in tap
        run: |
          set -euo pipefail
          cp interesting-notch@rc.rb homebrew-tap/Casks/interesting-notch@rc.rb
          COMMIT_MSG="Update interesting-notch@rc to v${VERSION}"
          if [[ "${IS_BETA}" == "false" ]]; then
            cp interesting-notch.rb homebrew-tap/Casks/interesting-notch.rb
            COMMIT_MSG="Update interesting-notch and interesting-notch@rc to v${VERSION}"
          fi
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "$COMMIT_MSG"
            git push
          fi

  ending:
    name: Finalize
    if: ${{ always() && needs.preparation.result != 'skipped' }}
    needs: [preparation, build, publish, upgrade-brew]
    runs-on: ubuntu-latest
    env:
      ALL_RESULTS: ${{ join(needs.*.result, ',') }}
      RELEASE_SUCCEEDED: ${{ !contains(join(needs.*.result, ','), 'failure') && !contains(join(needs.*.result, ','), 'cancelled') }}
    steps:
      - name: Summary
        env:
          IS_BETA: ${{ needs.preparation.outputs.is_beta }}
          VERSION: ${{ needs.preparation.outputs.version }}
          BUILD_NUMBER: ${{ needs.preparation.outputs.build_number }}
        shell: bash
        run: |
          if [[ "${IS_BETA}" == "true" ]]; then
            BUILD_TYPE="beta"
          else
            BUILD_TYPE="stable"
          fi
          {
            if [[ "${RELEASE_SUCCEEDED}" == "true" ]]; then
              echo "✅ Released InterestingNotch v${VERSION} (${BUILD_TYPE} build ${BUILD_NUMBER})"
              echo "🍺 Homebrew cask updated"
              echo "📱 Sparkle appcast updated"
            else
              echo "❌ Release failed${VERSION:+ for InterestingNotch v${VERSION}}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
