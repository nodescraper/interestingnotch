name: Fork PR target policy

on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited, ready_for_review]

permissions: {}

jobs:
  validate:
    name: Fork PR target check
    if: ${{ github.event.pull_request.head.repo.fork == true }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Enforce target policy
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const base = context.payload.pull_request.base.ref;
            const pull_number = context.payload.pull_request.number;

            const toSafeLiteral = (value) =>
              JSON.stringify(String(value))
                .replace(/[\u200E\u200F\u202A-\u202E\u2066-\u2069]/g, (c) =>
                  `\\u${c.codePointAt(0).toString(16).padStart(4, '0')}`
                )
                .replace(/</g, '\\u003c')
                .replace(/>/g, '\\u003e')
                .replace(/&/g, '\\u0026')
                .replace(/@/g, '\\u0040')
                .replace(/#/g, '\\u0023')
                .replace(/`/g, '\\u0060');

            if (base !== 'main') {
              core.setFailed(
                `PR #${pull_number} targets ${toSafeLiteral(base)}: not allowed. Only "main" is permitted.`
              );
              return;
            }
            core.info("PR targets main: allowed.");
